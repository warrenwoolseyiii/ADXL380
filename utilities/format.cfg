# Uncrustify configuration for ADXL380 sensor driver
# Based on firmware-sensor-driver-repo-template conventions

#
# General options
#

newlines                        = lf
input_tab_size                  = 4
output_tab_size                 = 4
string_escape_char              = 92    # '\'
string_escape_char2             = 0

#
# Indenting
#

indent_columns                  = 4
indent_with_tabs                = 0
indent_align_string             = false
indent_xml_string               = 0
indent_brace                    = 0
indent_braces                   = false
indent_braces_no_func           = false
indent_braces_no_class          = false
indent_braces_no_struct         = false
indent_brace_parent             = false
indent_namespace                = false
indent_extern                   = false
indent_class                    = true
indent_class_colon              = false
indent_else_if                  = false
indent_var_def_cont             = false
indent_func_call_param          = false
indent_func_def_param           = false
indent_func_proto_param         = false
indent_func_class_param         = false
indent_func_ctor_var_param      = false
indent_template_param           = false
indent_func_param_double        = false
indent_relative_single_line_comments = false
indent_switch_case              = 4
indent_case_shift               = 0
indent_case_brace               = 0
indent_col1_comment             = false
indent_label                    = 1
indent_access_spec              = -4
indent_paren_nl                 = false
indent_comma_paren              = false
indent_bool_paren               = false
indent_first_bool_expr          = false
indent_square_nl                = false
indent_preserve_sql             = false
indent_align_assign             = true

#
# Spacing options
#

sp_arith                        = add
sp_assign                       = add
sp_assign_default               = add
sp_enum_assign                  = add
sp_bool                         = add
sp_compare                      = add
sp_inside_paren                 = remove
sp_paren_paren                  = remove
sp_balance_nested_parens        = false
sp_paren_brace                  = add
sp_before_ptr_star              = add
sp_before_unnamed_ptr_star      = add
sp_between_ptr_star             = remove
sp_after_ptr_star               = remove
sp_after_ptr_star_func          = add
sp_before_ptr_star_func         = add
sp_before_byref                 = add
sp_before_unnamed_byref         = add
sp_after_byref                  = remove
sp_after_byref_func             = add
sp_before_byref_func            = add
sp_after_type                   = add
sp_before_angle                 = remove
sp_inside_angle                 = remove
sp_after_angle                  = add
sp_angle_paren                  = remove
sp_angle_word                   = add
sp_before_sparen                = add
sp_inside_sparen                = remove
sp_sparen_brace                 = add
sp_after_sparen                 = add
sp_special_semi                 = add
sp_before_semi                  = remove
sp_before_semi_for              = remove
sp_before_semi_for_empty        = remove
sp_after_semi                   = add
sp_after_semi_for               = add
sp_after_semi_for_empty         = remove
sp_before_square                = remove
sp_before_squares               = remove
sp_inside_square                = remove
sp_after_comma                  = add
sp_before_comma                 = remove
sp_after_class_colon            = add
sp_before_class_colon           = add
sp_before_case_colon            = remove
sp_after_operator               = remove
sp_after_operator_sym           = remove
sp_after_cast                   = remove
sp_inside_paren_cast            = remove
sp_cpp_cast_paren               = remove
sp_sizeof_paren                 = remove
sp_inside_braces_enum           = add
sp_inside_braces_struct         = add
sp_inside_braces                = add
sp_inside_braces_empty          = remove
sp_type_func                    = add
sp_func_proto_paren             = remove
sp_func_def_paren               = remove
sp_inside_fparens               = remove
sp_inside_fparen                = remove
sp_square_fparen                = remove
sp_func_call_paren              = remove
sp_func_call_user_paren         = remove
sp_func_class_paren             = remove
sp_return_paren                 = add
sp_attribute_paren              = remove
sp_defined_paren                = remove
sp_macro                        = add
sp_macro_func                   = remove
sp_else_brace                   = add
sp_brace_else                   = add
sp_brace_typedef                = add
sp_catch_brace                  = add
sp_brace_catch                  = add
sp_finally_brace                = add
sp_brace_finally                = add
sp_try_brace                    = add
sp_getset_brace                 = add
sp_before_dc                    = remove
sp_after_dc                     = remove
sp_not                          = remove
sp_inv                          = remove
sp_addr                         = remove
sp_member                       = remove
sp_deref                        = remove
sp_sign                         = remove
sp_incdec                       = remove
sp_before_nl_cont               = add
sp_after_oc_scope               = remove
sp_before_oc_colon              = remove
sp_after_oc_colon               = remove
sp_before_oc_dict_colon         = remove
